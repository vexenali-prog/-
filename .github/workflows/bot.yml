name: Телеграм-бот Момент

on:
  schedule:
    - cron: '*/30 * * * *'   # проверка каждые ~30 минут (GitHub может задерживать)
  workflow_dispatch: {}       # ручной запуск для проверки
  push:
    branches: [main]
    paths: ['bot/briefing.json']  # утренний разбор от ИИ запускает отправку сразу

permissions:
  contents: write             # чтобы запоминать последний сигнал в bot/state.json

concurrency:
  group: moment-bot
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Проверить рынок и отправить сообщение
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node bot/send.js
      - name: Сохранить состояние сигнала
        run: |
          if ! git diff --quiet bot/state.json 2>/dev/null; then
            git config user.name "moment-bot"
            git config user.email "actions@github.com"
            git add bot/state.json
            git commit -m "bot: update signal state [skip ci]"
            git pull --rebase origin main || true
            git push origin HEAD:main || echo "push failed, state will retry next run"
          fi
