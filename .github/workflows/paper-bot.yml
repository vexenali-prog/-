name: Paper trading bot

on:
  schedule:
    - cron: "3 * * * *"   # каждый час, в :03 (после закрытия часовой свечи)
  workflow_dispatch:       # ручной запуск кнопкой

permissions:
  contents: write

concurrency:
  group: paper-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Зависимости (график для сводки)
        run: pip install --quiet matplotlib

      - name: Запуск бота
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m bot.run

      - name: Сохранить состояние портфеля
        run: |
          git config user.name "paper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state/paper_state.json
          git diff --cached --quiet && exit 0
          git commit -m "state: обновление портфеля $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

      - name: Сообщить о сбое в Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="⚠️ Часовой запуск бота упал. Лог: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null
